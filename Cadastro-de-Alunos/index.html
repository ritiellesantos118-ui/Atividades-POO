<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Cadastro de Aluno</h2>
        
        <label for="nome">Nome do Aluno:</label>
        <input type="text" id="nome" placeholder="Ex: João Silva">

        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" min="0" max="10" step="0.1">

        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" min="0" max="10" step="0.1">

        <button onclick="registrarAluno()">Calcular Resultado</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
