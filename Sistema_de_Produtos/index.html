<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Produtos Dinâmico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>🛒 Finalizar Compra</h2>
        
        <div class="item-info">
            <span id="nome-produto">Produto</span>
            <span id="preco-unitario">R$ 0,00</span>
        </div>

        <div class="controle-quantidade">
            <label for="qtd">Quantidade:</label>
            <input type="number" id="qtd" value="0" min="0">
        </div>

        <hr>

        <div class="total-container">
            <span>Total:</span>
            <span id="valor-total" class="total-destaque">R$ 0,00</span>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
